services:
  mariadb:
    image: mariadb:10.11
    container_name: test-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "127.0.0.1:3310:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./tests/db/world.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backup-net
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  backup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: test-backup
    depends_on:
      mariadb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      K8S_NAMESPACE: ${K8S_NAMESPACE}
      TARGET_DATABASE_HOST: mariadb
      TARGET_DATABASE_PORT: 3306
      TARGET_DATABASE_USER: ${MYSQL_USER}
      TARGET_DATABASE_PASSWORD: ${MYSQL_PASSWORD}
      TARGET_DATABASE_NAMES: ${MYSQL_DATABASE}
    networks:
      - backup-net
    command: sh /perform-backup.sh

volumes:
  mariadb_data:

networks:
  backup-net:
    driver: bridge
